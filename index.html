                                        <Icon name="power" size={32} /> שליטה בסטטוס הדוכן
                                    </h3>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-4 gap-6">
                                        <button
                                            type="button"
                                            onClick={() => updateSettingsData({ overrideStatus: 'auto' })}
                                            className={`p-6 border-4 border-black font-black text-xl transition-all uppercase ${(!settings.overrideStatus || settings.overrideStatus === 'auto') ? 'bg-yellow-400 shadow-[6px_6px_0_0_#000] scale-105' : 'bg-white hover:bg-gray-100'}`}
                                        >
                                            ⏱️ אוטומטי (לפי שעות)
                                        </button>

                                        <div className={`p-4 border-4 border-black transition-all flex flex-col justify-center ${settings.overrideStatus === 'open' ? 'bg-black text-yellow-400 shadow-[6px_6px_0_0_#FFD700] scale-105' : 'bg-white hover:bg-gray-100'}`}>
                                            <button
                                                type="button"
                                                onClick={() => updateSettingsData({ overrideStatus: 'open' })}
                                                className="font-black text-xl uppercase w-full text-center pb-2"
                                            >
                                                🌟 פתוח ספיישל
                                            </button>
                                            {settings.overrideStatus === 'open' && (
                                                <div className="mt-2 pt-3 border-t-2 border-gray-700 w-full">
                                                    <label className="text-sm font-bold text-gray-300 block mb-1">מיקום נוכחי:</label>
                                                    <input
                                                        type="text"
                                                        value={settings.specialLocation || ''}
                                                        onChange={(e) => updateSettingsData({ specialLocation: e.target.value })}
                                                        placeholder="מיקום הדוכן..."
                                                        className="w-full p-2 border-2 border-yellow-400 bg-gray-900 text-white font-bold outline-none text-center"
                                                    />
                                                </div>
                                            )}
                                        </div>

                                        <button
                                            type="button"
                                            onClick={() => updateSettingsData({ overrideStatus: 'open_no_orders' })}
                                            className={`p-6 border-4 border-black font-black text-xl transition-all uppercase ${settings.overrideStatus === 'open_no_orders' ? 'bg-orange-500 text-black shadow-[6px_6px_0_0_#000] scale-105' : 'bg-white hover:bg-gray-100'}`}
                                        >
                                            🚫 פתוח, אך סגור להזמנות
                                        </button>

                                        <button
                                            type="button"
                                            onClick={() => updateSettingsData({ overrideStatus: 'closed' })}
                                            className={`p-6 border-4 border-black font-black text-xl transition-all uppercase ${settings.overrideStatus === 'closed' ? 'bg-red-600 text-white shadow-[6px_6px_0_0_#000] scale-105' : 'bg-white hover:bg-gray-100'}`}
                                        >
                                            🛑 סגור כפוי
                                        </button>
                                    </div>
                                </div>

                                {/* Vacation dates */}
                                <div className="bg-white p-6 md:p-10 border-4 border-black shadow-[12px_12px_0_0_#000]">
                                    <h3 className="text-3xl font-black mb-8 flex items-center gap-3 bg-yellow-400 inline-block px-5 py-3 border-4 border-black uppercase">
                                        <Icon name="calendar-blank" size={32} /> יומן חופשות
                                    </h3>
                                    <div className="flex flex-col sm:flex-row gap-4 mb-8">
                                        <input
                                            type="date"
                                            value={newEventDate}
                                            onChange={(e) => setNewEventDate(e.target.value)}
                                            className="p-4 border-4 border-black font-black text-xl flex-1 outline-none focus:bg-yellow-50 shadow-[4px_4px_0_0_#000]"
                                        />
                                        <button
                                            type="button"
                                            onClick={handleAddEventDate}
                                            className="bg-black text-white px-8 py-4 border-4 border-black font-black text-xl uppercase hover:bg-yellow-400 hover:text-black transition-all shadow-[4px_4px_0_0_#000]"
                                        >
                                            הוסף תאריך
                                        </button>
                                    </div>
                                    <div className="flex flex-wrap gap-4">
                                        {(settings.eventDates || []).map(d => (
                                            <div key={d} className="bg-gray-100 border-4 border-black p-4 flex items-center gap-4 shadow-[4px_4px_0_0_#000]">
                                                <span className="font-black text-xl">{d}</span>
                                                <button
                                                    type="button"
                                                    onClick={() => handleRemoveEventDate(d)}
                                                    className="bg-red-500 text-white p-2 border-2 border-black hover:bg-red-600"
                                                >
                                                    <Icon name="trash" size={20} />
                                                </button>
                                            </div>
                                        ))}
                                        {(settings.eventDates || []).length === 0 && (
                                            <span className="font-bold text-gray-500">לא הוגדרו ימי חופשה.</span>
                                        )}
                                    </div>
                                </div>

                                {/* Links & announcements */}
                                <div className="bg-white p-6 md:p-10 border-4 border-black shadow-[12px_12px_0_0_#000]">
                                    <h3 className="text-3xl font-black mb-8 flex items-center gap-3 bg-yellow-400 inline-block px-5 py-3 border-4 border-black uppercase">
                                        <Icon name="megaphone" size={32} /> הודעות וקישורים
                                    </h3>
                                    <div className="space-y-6">
                                        <div>
                                            <label className="block font-black text-black mb-2 text-xl uppercase">הודעה קופצת</label>
                                            <div className="flex gap-4">
                                                <input
                                                    type="text"
                                                    value={announcementDraft}
                                                    onChange={e => setAnnouncementDraft(e.target.value)}
                                                    placeholder="למשל: היום מחלקים צ'יפס מתנה לכל קונה!"
                                                    className="w-full p-5 border-4 border-black font-black text-xl focus:bg-yellow-50 outline-none shadow-[4px_4px_0_0_#000]"
                                                />
                                                <button
                                                    type="button"
                                                    onClick={() => setAnnouncementDraft('')}
                                                    className="bg-red-500 text-white border-4 border-black font-black px-6 shadow-[4px_4px_0_0_#000] hover:bg-red-600"
                                                >
                                                    נקה
                                                </button>
                                            </div>
                                        </div>
                                        <div className="grid md:grid-cols-2 gap-8">
                                            <div>
                                                <label className="block font-black text-black mb-2 uppercase text-lg">קישור Bit</label>
                                                <input type="url" value={bitDraft} onChange={e => setBitDraft(e.target.value)} className="w-full p-4 border-4 border-black font-bold focus:bg-yellow-50 outline-none shadow-[4px_4px_0_0_#000]" dir="ltr" />
                                            </div>
                                            <div>
                                                <label className="block font-black text-black mb-2 uppercase text-lg">קישור PayBox</label>
                                                <input type="url" value={payboxDraft} onChange={e => setPayboxDraft(e.target.value)} className="w-full p-4 border-4 border-black font-bold focus:bg-yellow-50 outline-none shadow-[4px_4px_0_0_#000]" dir="ltr" />
                                            </div>
                                        </div>
                                        <div className="grid md:grid-cols-2 gap-8">
                                            <div>
                                                <label className="block font-black text-black mb-2 uppercase text-lg">Facebook</label>
                                                <input type="url" value={fbDraft} onChange={e => setFbDraft(e.target.value)} className="w-full p-4 border-4 border-black font-bold focus:bg-yellow-50 outline-none shadow-[4px_4px_0_0_#000]" dir="ltr" />
                                            </div>
                                            <div>
                                                <label className="block font-black text-black mb-2 uppercase text-lg">Instagram</label>
                                                <input type="url" value={igDraft} onChange={e => setIgDraft(e.target.value)} className="w-full p-4 border-4 border-black font-bold focus:bg-yellow-50 outline-none shadow-[4px_4px_0_0_#000]" dir="ltr" />
                                            </div>
                                        </div>
                                        <button
                                            type="button"
                                            onClick={handleSaveSettings}
                                            className="bg-black text-white hover:bg-yellow-400 hover:text-black font-black py-5 px-10 border-4 border-black shadow-[6px_6px_0_0_#FFD700] mt-8 transition-all uppercase text-2xl w-full md:w-auto"
                                        >
                                            שמור שינויים
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ---- WORKERS TAB ---- */}
                        {userRole === 'admin' && adminTab === 'workers' && (
                            <div className="bg-white p-6 md:p-10 border-4 border-black shadow-[12px_12px_0_0_#000]">
                                <h3 className="text-3xl font-black mb-8 bg-yellow-400 inline-block px-5 py-3 border-4 border-black uppercase">ניהול עובדים</h3>
                                <form onSubmit={handleAddWorker} className="flex flex-col md:flex-row gap-6 mb-10 bg-gray-100 p-8 border-4 border-black shadow-[6px_6px_0_0_#000]">
                                    <input
                                        type="text"
                                        placeholder="שם עובד"
                                        value={newWorkerName}
                                        onChange={e => setNewWorkerName(e.target.value)}
                                        className="flex-1 p-5 border-4 border-black font-black text-xl outline-none focus:bg-yellow-50"
                                        required
                                    />
                                    <input
                                        type="number"
                                        placeholder="קוד גישה (למשל 1111)"
                                        value={newWorkerPin}
                                        onChange={e => setNewWorkerPin(e.target.value)}
                                        className="flex-1 p-5 border-4 border-black font-black text-xl outline-none focus:bg-yellow-50"
                                        required
                                    />
                                    <button
                                        type="submit"
                                        className="bg-black text-white hover:bg-yellow-400 hover:text-black border-4 border-black font-black px-10 py-5 shadow-[4px_4px_0_0_#FFD700] transition-all uppercase text-2xl"
                                    >
                                        הוסף עובד
                                    </button>
                                </form>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {workers.map(w => (
                                        <div key={w.id} className="flex justify-between items-center bg-white p-6 border-4 border-black shadow-[4px_4px_0_0_#000]">
                                            <div className="font-black text-2xl">
                                                {w.name} <span className="bg-yellow-400 border-2 border-black px-3 py-1 text-base ml-3 align-middle">{w.pin}</span>
                                            </div>
                                            <button
                                                type="button"
                                                onClick={() => handleDeleteWorker(w.id)}
                                                className="bg-black text-white p-4 border-4 border-black hover:bg-red-500 transition-colors"
                                            >
                                                <Icon name="trash" size={24} />
                                            </button>
                                        </div>
                                    ))}
                                    {workers.length === 0 && (
                                        <p className="text-gray-500 font-bold col-span-2 text-center py-8">אין עובדים רשומים עדיין.</p>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ---- MENU TAB ---- */}
                        {userRole === 'admin' && adminTab === 'menu' && (
                            <div className="bg-white p-6 md:p-10 border-4 border-black shadow-[12px_12px_0_0_#000]">
                                <h3 className="text-3xl font-black mb-8 bg-yellow-400 inline-block px-5 py-3 border-4 border-black uppercase">ניהול תפריט מנות</h3>

                                <form onSubmit={handleAddMenuItem} className="flex flex-col gap-6 bg-gray-100 p-8 border-4 border-black mb-10 shadow-[6px_6px_0_0_#000]">
                                    <div className="flex flex-col md:flex-row gap-6">
                                        <input
                                            type="text"
                                            placeholder="שם מנה"
                                            value={newItemName}
                                            onChange={e => setNewItemName(e.target.value)}
                                            className="flex-1 p-5 border-4 border-black font-black text-xl outline-none focus:bg-yellow-50"
                                            required
                                        />
                                        <input
                                            type="number"
                                            step="0.1"
                                            placeholder="מחיר (₪)"
                                            value={newItemPrice}
                                            onChange={e => setNewItemPrice(e.target.value)}
                                            className="w-full md:w-32 p-5 border-4 border-black font-black text-xl outline-none focus:bg-yellow-50"
                                            required
                                        />
                                    </div>
                                    <div className="flex flex-col md:flex-row gap-6">
                                        <input
                                            type="text"
                                            placeholder="נתיב תמונה (למשל: images/drink.jpg)"
                                            value={newItemImageUrl}
                                            onChange={e => setNewItemImageUrl(e.target.value)}
                                            className="flex-1 p-5 border-4 border-black font-bold text-lg outline-none focus:bg-yellow-50"
                                            dir="ltr"
                                        />
                                        <select
                                            value={newItemCategory}
                                            onChange={e => setNewItemCategory(e.target.value)}
                                            className="p-5 border-4 border-black font-black text-xl outline-none focus:bg-yellow-50 bg-white uppercase"
                                        >
                                            <option value="none">ללא תוספות (שתייה/צ'יפס)</option>
                                            <option value="falafel">עם תוספות פלאפל</option>
                                            <option value="sabich">עם תוספות סביח</option>
                                        </select>
                                    </div>
                                    <button
                                        type="submit"
                                        className="bg-black text-white hover:bg-yellow-400 hover:text-black border-4 border-black font-black px-10 py-5 shadow-[4px_4px_0_0_#FFD700] transition-all uppercase text-2xl"
                                    >
                                        הוסף מנה לתפריט
                                    </button>
                                </form>

                                <div className="grid md:grid-cols-2 gap-6">
                                    {menuItems.map(item => (
                                        <div key={item.id} className="flex flex-col bg-white border-4 border-black shadow-[4px_4px_0_0_#000] overflow-hidden">
                                            <div className="h-32 bg-gray-200 border-b-4 border-black relative overflow-hidden">
                                                <ImageFallback
                                                    src={item.imageUrl}
                                                    alt={item.name}
                                                    name={item.name}
                                                    className="w-full h-32 object-cover"
                                                />
                                                {item.category !== 'none' && (
                                                    <div className="absolute top-2 right-2 bg-yellow-400 text-black px-2 py-1 text-sm font-black border-2 border-black">
                                                        {item.category === 'sabich' ? 'סביח' : 'פלאפל'}
                                                    </div>
                                                )}
                                            </div>
                                            <div className="flex justify-between items-center p-5">
                                                <div className="font-black text-2xl">
                                                    {item.name} <span className="bg-yellow-400 border-2 border-black px-3 py-1 text-base ml-2 align-middle">{item.price || 0}₪</span>
                                                </div>
                                                <button
                                                    type="button"
                                                    onClick={() => handleDeleteMenuItem(item.id)}
                                                    className="bg-black text-white p-3 border-2 border-black hover:bg-red-500 transition-colors"
                                                >
                                                    <Icon name="trash" size={24} />
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ---- ORDERS TAB (admin + worker) ---- */}
                        {(userRole === 'worker' || (userRole === 'admin' && adminTab === 'orders')) && (
                            <div className="space-y-8">
                                {!storeStatus.acceptOrders && (
                                    <div className="bg-black text-white p-6 border-4 border-black font-black text-2xl flex justify-center items-center gap-4 uppercase shadow-[8px_8px_0_0_#FFD700] mb-10">
                                        <Icon name="warning-circle" size={36} className="text-yellow-400" /> שימו לב: הדוכן מסומן כסגור להזמנות מבחוץ!
                                    </div>
                                )}

                                {activeOrders.length === 0 ? (
                                    <div className="text-center p-20 bg-white border-4 border-black border-dashed shadow-[12px_12px_0_0_#000]">
                                        <Icon name="check" size={100} className="mx-auto mb-8 text-gray-300 block" />
                                        <p className="text-5xl font-black text-gray-400 uppercase">הלוח נקי לגמרי!</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-10">
                                        {activeOrders.map(order => {
                                            const safeOrderId = order.id || '0000';
                                            const statusColors = {
                                                pending_approval: 'border-orange-500 bg-orange-50',
                                                new: 'border-black bg-white',
                                                in_progress: 'border-blue-500 bg-blue-50',
                                                ready: 'border-green-500 bg-green-50'
                                            };
                                            const currentTheme = statusColors[order.status] || 'border-black bg-white';
                                            const phone = (order.phone || '').replace(/\D/g, '').replace(/^0/, '972');
                                            const waMsg = encodeURIComponent("הפלאפל שלך מוכן ואנחנו מחכים לך בדוכן! 🥙");

                                            return (
                                                <div key={safeOrderId} className={`p-6 md:p-8 border-4 shadow-[12px_12px_0_0_#000] relative ${currentTheme}`}>
                                                    {order.status === 'ready' && (
                                                        <div className="absolute top-0 right-0 bg-green-500 text-white font-black px-5 py-2 border-b-4 border-l-4 border-green-700 uppercase text-lg">מוכן ✔️</div>
                                                    )}
                                                    {order.status === 'pending_approval' && (
                                                        <div className="absolute top-0 right-0 bg-orange-500 text-white font-black px-5 py-2 border-b-4 border-l-4 border-orange-700 uppercase text-lg">הזמנה גדולה!</div>
                                                    )}

                                                    <div className="flex justify-between items-start mb-8 border-b-4 border-black pb-6">
                                                        <div>
                                                            <div className="flex gap-4 items-center mb-4">
                                                                <span className="bg-black text-yellow-400 px-4 py-2 border-4 border-black font-black text-3xl tracking-widest">#{safeOrderId.slice(-4)}</span>
                                                                <span className="flex items-center gap-2 bg-white text-black border-4 border-black px-4 py-2 font-black text-xl">
                                                                    <Icon name="clock" size={24} /> {order.arrivalTime}
                                                                </span>
                                                            </div>
                                                            <div className="font-black text-3xl text-black flex items-center gap-3 uppercase">
                                                                <Icon name="user" size={32} /> {order.customerName || 'ללא שם'}
                                                            </div>
                                                        </div>
                                                        <div className="bg-yellow-400 px-5 py-3 border-4 border-black font-black text-black text-4xl shadow-[6px_6px_0_0_#000]">
                                                            {order.totalPrice || 0} ₪
                                                        </div>
                                                    </div>

                                                    {order.orderNote && (
                                                        <div className="bg-yellow-200 border-4 border-black p-4 mb-6 shadow-[4px_4px_0_0_#000] flex items-start gap-3">
                                                            <Icon name="file-text" size={28} className="shrink-0 text-black mt-1" />
                                                            <div>
                                                                <div className="font-black uppercase text-sm mb-1">הערה:</div>
                                                                <div className="font-bold text-xl">{order.orderNote}</div>
                                                            </div>
                                                        </div>
                                                    )}

                                                    <div className="space-y-5 mb-8">
                                                        {(order.items || []).map((item, idx) => (
                                                            <div key={idx} className="bg-white p-5 border-4 border-black relative">
                                                                {item && item.forWho && (
                                                                    <div className="absolute top-0 right-0 bg-black text-white text-base font-black px-4 py-1 border-b-4 border-l-4 border-black uppercase">
                                                                        עבור: {item.forWho}
                                                                    </div>
                                                                )}
                                                                <div className={`font-black text-3xl text-black ${item && item.forWho ? 'mt-8' : ''}`}>
                                                                    {(item && item.item && item.item.name) || 'מנה'}
                                                                </div>
                                                                {item && (item.ingredients || []).length > 0
                                                                    ? <div className="mt-4 flex flex-wrap gap-3">{item.ingredients.map((ing, i) => <span key={i} className="bg-yellow-400 text-black font-black text-base px-3 py-1 border-4 border-black uppercase">{ing}</span>)}</div>
                                                                    : (item && item.item && item.item.category !== 'none')
                                                                        ? <div className="bg-black text-white inline-block px-3 py-1 text-base font-black mt-3 uppercase border-4 border-black">ללא תוספות!</div>
                                                                        : null}
                                                            </div>
                                                        ))}
                                                    </div>

                                                    {/* Action buttons */}
                                                    <div className="flex flex-col sm:flex-row gap-5">
                                                        {order.status === 'pending_approval' && (
                                                            <button
                                                                type="button"
                                                                onClick={() => updateOrderStatus(safeOrderId, 'new')}
                                                                className="w-full bg-orange-500 text-white font-black py-5 border-4 border-orange-700 shadow-[6px_6px_0_0_#c2410c] flex justify-center items-center gap-3 uppercase text-2xl active:translate-y-1 active:shadow-none"
                                                            >
                                                                <Icon name="check" size={32} /> אישור הכנה
                                                            </button>
                                                        )}

                                                        {order.status === 'new' && (
                                                            <button
                                                                type="button"
                                                                onClick={() => updateOrderStatus(safeOrderId, 'in_progress')}
                                                                className="w-full bg-yellow-400 text-black border-4 border-black font-black py-5 flex justify-center items-center gap-3 shadow-[8px_8px_0_0_#000] uppercase text-3xl active:translate-y-1 active:translate-x-1 active:shadow-[2px_2px_0_0_#000] transition-all"
                                                            >
                                                                <Icon name="chef-hat" size={36} /> אני מכין!
                                                            </button>
                                                        )}

                                                        {order.status === 'in_progress' && order.workerId === currentWorkerId && (
                                                            <button
                                                                type="button"
                                                                onClick={() => updateOrderStatus(safeOrderId, 'ready')}
                                                                className="w-full bg-black text-yellow-400 border-4 border-black font-black py-5 flex justify-center items-center gap-3 shadow-[8px_8px_0_0_#FFD700] uppercase text-3xl active:translate-y-1 active:translate-x-1 active:shadow-[2px_2px_0_0_#FFD700] transition-all animate-pulse"
                                                            >
                                                                <Icon name="check" size={36} /> סיימתי, מוכן!
                                                            </button>
                                                        )}

                                                        {order.status === 'in_progress' && order.workerId !== currentWorkerId && (
                                                            <div className="w-full bg-white border-4 border-black text-black font-black py-5 flex justify-center items-center gap-3 opacity-50 text-xl">
                                                                <Icon name="chef-hat" size={28} /> בהכנה ע"י {order.workerName}
                                                            </div>
                                                        )}

                                                        {order.status === 'ready' && (
                                                            <div className="w-full grid grid-cols-2 gap-4">
                                                                <a
                                                                    href={`https://wa.me/${phone}?text=${waMsg}`}
                                                                    target="_blank"
                                                                    rel="noopener noreferrer"
                                                                    className="bg-[#25D366] text-white border-4 border-black font-black py-5 flex justify-center items-center gap-3 shadow-[6px_6px_0_0_#000] uppercase text-xl active:translate-y-1"
                                                                >
                                                                    <Icon name="whatsapp-logo" size={28} /> סמס שהוכן
                                                                </a>
                                                                <a
                                                                    href={`tel:${order.phone}`}
                                                                    className="bg-white text-black border-4 border-black font-black py-5 flex justify-center items-center gap-3 shadow-[6px_6px_0_0_#000] uppercase text-xl active:translate-y-1"
                                                                >
                                                                    <Icon name="phone" size={28} /> חייג ללקוח
                                                                </a>
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Archive / Delete */}
                                                    <div className="mt-5 border-t-4 border-dashed border-gray-300 pt-5">
                                                        {order.status === 'ready' ? (
                                                            <button
                                                                type="button"
                                                                onClick={() => handleArchiveOrder(safeOrderId)}
                                                                className="w-full py-4 px-6 border-4 border-black font-black flex justify-center items-center shadow-[4px_4px_0_0_#000] active:translate-y-1 transition-all uppercase text-xl bg-white text-black"
                                                            >
                                                                סמן כנמסר (ארכיון)
                                                            </button>
                                                        ) : (
                                                            <button
                                                                type="button"
                                                                onClick={() => handleCancelOrder(safeOrderId)}
                                                                className="w-full py-4 px-6 border-4 border-black font-black flex justify-center items-center shadow-[4px_4px_0_0_#000] active:translate-y-1 transition-all uppercase text-xl bg-red-500 text-white"
                                                            >
                                                                <Icon name="trash" size={24} className="ml-2" /> בטל הזמנה ומחק
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                );
            };

            const renderLogin = () => (
                <div className="max-w-md mx-auto bg-yellow-400 p-10 border-4 border-black shadow-[16px_16px_0_0_#000] mt-20 text-center relative">
                    <div className="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-white border-4 border-black p-5 rounded-full shadow-[6px_6px_0_0_#000]">
                        <Icon name="storefront" size={48} className="text-black" />
                    </div>
                    <h2 className="text-4xl font-black mb-10 mt-8 text-black uppercase">כניסת צוות</h2>
                    <input
                        type="password"
                        placeholder="קוד גישה..."
                        value={pin}
                        onChange={(e) => setPin(e.target.value)}
                        onKeyDown={(e) => { if (e.key === 'Enter') handleLogin(); }}
                        className="w-full p-6 mb-8 border-4 border-black text-black font-black text-center text-4xl tracking-widest outline-none shadow-[6px_6px_0_0_#000] focus:shadow-none focus:translate-y-1 focus:translate-x-1 transition-all bg-white"
                        dir="ltr"
                    />
                    <button
                        type="button"
                        onClick={handleLogin}
                        className="w-full bg-black text-white font-black py-6 border-4 border-black mb-8 shadow-[8px_8px_0_0_#fff] uppercase text-2xl active:translate-y-1 active:translate-x-1 active:shadow-none transition-all hover:bg-gray-900"
                    >
                        היכנס למערכת
                    </button>
                    <button
                        type="button"
                        onClick={() => setView('welcome')}
                        className="w-full text-black font-black text-lg uppercase underline hover:text-gray-800"
                    >
                        חזור למסך לקוחות
                    </button>
                </div>
            );

            // ---- MAIN RENDER ----
            return (
                <div className="min-h-screen bg-gray-50 text-black font-sans selection:bg-black selection:text-yellow-400 pb-12" dir="rtl">
                    <div className="fixed inset-0 opacity-[0.03] pointer-events-none" style={{ backgroundImage: 'radial-gradient(#000 3px, transparent 3px)', backgroundSize: '40px 40px' }}></div>

                    <div className="max-w-4xl mx-auto sm:p-6 min-h-screen flex flex-col relative z-10">
                        {view !== 'welcome' && view !== 'dashboard' && view !== 'login' && view !== 'tracking' && view !== 'search_order' && (
                            <div className="p-4 pt-10">{renderHeader()}</div>
                        )}
                        <div className="flex-grow">
                            {view === 'welcome' && <div className="px-4">{renderWelcome()}</div>}
                            {view === 'menu' && <div className="px-4">{renderMenu()}</div>}
                            {view === 'customize' && <div className="p-4">{renderCustomize()}</div>}
                            {view === 'cart' && <div className="p-4">{renderCart()}</div>}
                            {view === 'login' && <div className="p-4">{renderLogin()}</div>}
                            {view === 'tracking' && <div className="p-4">{renderTracking()}</div>}
                            {view === 'search_order' && <div className="p-4">{renderSearchOrder()}</div>}
                        </div>
                    </div>

                    {view === 'dashboard' && (
                        <div className="p-4 md:p-8 relative z-10 bg-gray-100 min-h-screen">
                            {renderDashboard()}
                        </div>
                    )}

                    <ModalComponent />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

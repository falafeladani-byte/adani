<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פלאפל עדני - הזמנות אונליין</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-left: 2px solid black; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #FFD700; border: 1px solid black; }
        .ph-bold { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body class="bg-gray-50 text-black font-sans selection:bg-black selection:text-yellow-400 pb-12">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🔥 FIREBASE CONFIG 🔥
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDDDqa7BMnCA5IDlAfTjKUvlDdHgapnJnM",
            authDomain: "falafel-adani.firebaseapp.com",
            projectId: "falafel-adani",
            storageBucket: "falafel-adani.firebasestorage.app",
            messagingSenderId: "319607616871",
            appId: "1:319607616871:web:68982636107da666262bc2"
        };

        let db = null;
        let auth = null;

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
            auth = firebase.auth();
        } catch(e) {
            console.error("Firebase init error:", e);
        }

        const Icon = ({ name, size = 24, className = '' }) => (
            <i className={`ph-bold ph-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        const INGREDIENTS_FALAFEL = ["חומוס", "כדורים", "חריף", "קטשופ", "סלט ירקות", "חמוצים", "כרוב", "טחינה", "עמבה", "צ'יפס"];
        const INGREDIENTS_SABICH = ["חומוס", "חריף", "קטשופ", "סלט ירקות", "חמוצים", "כרוב", "טחינה", "עמבה", "צ'יפס", "ביצה", "חציל"];

        const LOCATIONS = {
            0: 'סגור', 1: 'נריה', 2: 'נעלה', 3: 'כפר האורנים', 4: 'מושב שילת', 5: 'סגור', 6: 'סגור'
        };

        const DEFAULT_MENU = [
            { id: '1', name: "מנת פלאפל", price: 22, category: 'falafel', imageUrl: "falafel.jpg" },
            { id: '2', name: "חצי מנה פלאפל", price: 12, category: 'falafel', imageUrl: "half-falafel.jpg" },
            { id: '3', name: "מנת סביח", price: 22, category: 'sabich', imageUrl: "sabich.jpg" },
            { id: '4', name: "מנת צ'יפס", price: 15, category: 'none', imageUrl: "chips.jpg" },
            { id: '5', name: "פחית", price: 8, category: 'none', imageUrl: "can.jpg" },
            { id: '6', name: "בקבוק שתייה", price: 9, category: 'none', imageUrl: "bottle.jpg" },
            { id: '7', name: "מים", price: 5, category: 'none', imageUrl: "water.jpg" },
            { id: '8', name: "סודה", price: 7, category: 'none', imageUrl: "soda.jpg" },
            { id: '9', name: "חמצוץ גדול", price: 3, category: 'none', imageUrl: "sour-big.jpg" },
            { id: '10', name: "חמצוץ קטן (2 בשקל)", price: 0.5, category: 'none', imageUrl: "sour-small.jpg" }
        ];

        const DEFAULT_SETTINGS = {
            overrideStatus: 'auto',
            specialLocation: '',
            eventDates: [],
            facebookLink: '',
            instagramLink: '',
            announcement: '',
            bitLink: '',
            payboxLink: ''
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('welcome');
            const [userRole, setUserRole] = useState('customer');
            const [currentWorkerId, setCurrentWorkerId] = useState('');
            const [currentWorkerName, setCurrentWorkerName] = useState('');
            const [adminTab, setAdminTab] = useState('orders');

            const [orders, setOrders] = useState([]);
            const [menuItems, setMenuItems] = useState(DEFAULT_MENU);
            const [workers, setWorkers] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);

            const [modal, setModal] = useState({ show: false, message: '', type: 'alert', onConfirm: null });

            const [cart, setCart] = useState([]);
            const [cartAnimation, setCartAnimation] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);
            const [selectedIngredients, setSelectedIngredients] = useState({});
            const [itemForWho, setItemForWho] = useState('');
            const [orderNote, setOrderNote] = useState('');
            const [customerName, setCustomerName] = useState('');
            const [customerPhone, setCustomerPhone] = useState('');
            const [arrivalTime, setArrivalTime] = useState('');
            const [currentOrderId, setCurrentOrderId] = useState(null);

            const [searchQuery, setSearchQuery] = useState('');
            const [searchError, setSearchError] = useState('');

            const [newItemName, setNewItemName] = useState('');
            const [newItemPrice, setNewItemPrice] = useState('');
            const [newItemImageUrl, setNewItemImageUrl] = useState('');
            const [newItemCategory, setNewItemCategory] = useState('none');
            const [newWorkerName, setNewWorkerName] = useState('');
            const [newWorkerPin, setNewWorkerPin] = useState('');
            const [newEventDate, setNewEventDate] = useState('');
            const [pin, setPin] = useState('');

            const [fbDraft, setFbDraft] = useState('');
            const [igDraft, setIgDraft] = useState('');
            const [announcementDraft, setAnnouncementDraft] = useState('');
            const [bitDraft, setBitDraft] = useState('');
            const [payboxDraft, setPayboxDraft] = useState('');

            const prevOrderCount = useRef(0);
            const isFirstLoad = useRef(true);

            // ==========================================
            // פונקציות התראה (צליל ופוש)
            // ==========================================
            const playNotificationSound = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0, ctx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.5);
                } catch (e) { }
            };

// ==========================================
// 🔔 SERVICE WORKER REGISTRATION
// ==========================================
const registerServiceWorker = async () => {
    if (!("serviceWorker" in navigator)) return null;
    try {
        const reg = await navigator.serviceWorker.register("service-worker.js", { scope: "/" });
        console.log("[App] SW registered:", reg.scope);
        return reg;
    } catch (err) {
        console.warn("[App] SW failed:", err.message);
        return null;
    }
};

window.addEventListener("load", () => { registerServiceWorker(); });

const requestNotificationPermission = async () => {
    if (!("Notification" in window)) return;
    if (Notification.permission === "default") {
        await Notification.requestPermission();
    }
    if ("serviceWorker" in navigator && Notification.permission === "granted") {
        await registerServiceWorker();
    }
};

const showPushNotification = async () => {
    if (!("Notification" in window) || Notification.permission !== "granted") return;
    try {
        if ("serviceWorker" in navigator) {
            let reg = await navigator.serviceWorker.getRegistration();
            if (!reg) reg = await registerServiceWorker();
            if (reg) {
                const sw = reg.active || reg.waiting || reg.installing;
                if (sw) {
                    sw.postMessage({
                        type: "NEW_ORDER",
                        payload: {
                            body: "הזמנה חדשה התקבלה! כנס ללוח להכין 🥙",
                            icon: "logo.jpg",
                            url: window.location.href
                        }
                    });
                    return;
                }
                await reg.showNotification("פלאפל עדני - הזמנה חדשה! 🥙", {
                    body: "הזמנה חדשה התקבלה! כנס ללוח להכין 🥙",
                    icon: "logo.jpg",
                    vibrate: [200, 100, 200, 100, 200],
                    requireInteraction: true,
                    tag: "new-order-" + Date.now()
                });
                return;
            }
        }
    } catch (err) { console.warn("[App] SW notification failed:", err); }
    
    // Fallback
    new Notification("פלאפל עדני - הזמנה חדשה! 🥙", {
        body: "הזמנה חדשה התקבלה! כנס ללוח להכין 🥙",
        icon: "logo.jpg"
    });
};
            // ==========================================

            // Auth init
            useEffect(() => {
                if (!auth) return;
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (!u) {
                        auth.signInAnonymously().catch(e => console.error("Auth Error:", e));
                    }
                });
                return () => unsubscribe();
            }, []);

            // Firebase data listeners
            useEffect(() => {
                if (!db) return;

                const unsubMenu = db.collection('menu').onSnapshot((snapshot) => {
                    const fetched = [];
                    snapshot.forEach(doc => fetched.push({ id: doc.id, ...doc.data() }));
                    if (fetched.length > 0) {
                        fetched.sort((a, b) => (Number(b.price) || 0) - (Number(a.price) || 0));
                        setMenuItems(fetched);
                    }
                });

                const unsubOrders = db.collection('orders').onSnapshot((snapshot) => {
                    const fetched = [];
                    snapshot.forEach(doc => fetched.push({ id: doc.id, ...doc.data() }));
                    fetched.sort((a, b) => (a.arrivalTime || '').localeCompare(b.arrivalTime || ''));
                    setOrders(fetched);
                });

                const unsubWorkers = db.collection('workers').onSnapshot((snapshot) => {
                    const fetched = [];
                    snapshot.forEach(doc => fetched.push({ id: doc.id, ...doc.data() }));
                    setWorkers(fetched);
                });

                const unsubSettings = db.collection('settings').doc('general').onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        const safe = {
                            overrideStatus: data.overrideStatus || 'auto',
                            specialLocation: data.specialLocation || '',
                            eventDates: data.eventDates || [],
                            facebookLink: data.facebookLink || '',
                            instagramLink: data.instagramLink || '',
                            announcement: data.announcement || '',
                            bitLink: data.bitLink || '',
                            payboxLink: data.payboxLink || ''
                        };
                        setSettings(safe);
                        setFbDraft(safe.facebookLink);
                        setIgDraft(safe.instagramLink);
                        setAnnouncementDraft(safe.announcement);
                        setBitDraft(safe.bitLink);
                        setPayboxDraft(safe.payboxLink);
                    } else {
                        db.collection('settings').doc('general').set(DEFAULT_SETTINGS);
                    }
                });

                return () => { unsubMenu(); unsubOrders(); unsubWorkers(); unsubSettings(); };
            }, []);

            // Notification sound & push on new orders
            useEffect(() => {
                if (userRole !== 'admin' && userRole !== 'worker') return;
                const activeCount = orders.filter(o => o.status === 'new' || o.status === 'pending_approval').length;
                if (isFirstLoad.current) {
                    prevOrderCount.current = activeCount;
                    isFirstLoad.current = false;
                    return;
                }
                if (activeCount > prevOrderCount.current) {
                    playNotificationSound();
                    showPushNotification(); // קריאה לפוש!
                }
                prevOrderCount.current = activeCount;
            }, [orders, userRole]);

            const showAlert = useCallback((message) => {
                setModal({ show: true, message, type: 'alert', onConfirm: null });
            }, []);

            const showConfirm = useCallback((message, onConfirm) => {
                setModal({ show: true, message, type: 'confirm', onConfirm });
            }, []);

            const closeModal = useCallback(() => {
                setModal({ show: false, message: '', type: 'alert', onConfirm: null });
            }, []);

            // ---- STORE STATUS ----
            const getStoreStatus = () => {
                const now = new Date();
                const day = now.getDay();
                const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const timeVal = now.getHours() + now.getMinutes() / 60;
                const location = LOCATIONS[day] || 'סגור';
                const override = settings.overrideStatus || 'auto';
                const events = settings.eventDates || [];

                if (override === 'closed') return { open: false, acceptOrders: false, location: 'סגור', reason: 'הדוכן נסגר כעת, נתראה מחר!' };
                if (override === 'open_no_orders') return { open: true, acceptOrders: false, location: location !== 'סגור' ? location : (settings.specialLocation || 'מיקום ספיישל'), reason: 'עקב עומס אנו לא מקבלים כרגע הזמנות באפליקציה. פתוחים ומוזמנים להגיע במקום!' };
                if (override === 'open') return { open: true, acceptOrders: true, location: settings.specialLocation || 'מיקום ספיישל', reason: 'הדוכן פתוח באופן מיוחד' };
                if (events.includes(dateStr)) return { open: false, acceptOrders: false, location: 'סגור', reason: 'הדוכן סגור היום לרגל חופשה/אירוע פרטי.' };
                if (day === 0 || day === 5 || day === 6) return { open: false, acceptOrders: false, location: 'סגור', reason: "הדוכן אינו פעיל בימים א׳, ו׳ ושבת." };
                if (timeVal < 16.5 || timeVal > 20.5) return { open: false, acceptOrders: false, location, reason: 'שעות פעילות: 16:30 עד 20:30. כרגע סגור.' };
                return { open: true, acceptOrders: true, location, reason: '' };
            };

            const storeStatus = getStoreStatus();

            // ---- HANDLERS ----
            const handleSelectItem = (item) => {
                if (!storeStatus.acceptOrders) {
                    showAlert('הדוכן סגור להזמנות כרגע. נשמח לראותכם כשנפתח! 😊');
                    return;
                }
                setSelectedItem(item);
                setItemForWho('');
                if (item && item.category !== 'none') {
                    const defaultIngredients = {};
                    const listToUse = item.category === 'sabich' ? INGREDIENTS_SABICH : INGREDIENTS_FALAFEL;
                    listToUse.forEach(ing => { defaultIngredients[ing] = true; });
                    setSelectedIngredients(defaultIngredients);
                } else {
                    setSelectedIngredients({});
                }
                setView('customize');
            };

            const addToCart = () => {
                if (!selectedItem) return;
                const finalIngredients = (selectedItem.category !== 'none')
                    ? Object.keys(selectedIngredients).filter(k => selectedIngredients[k])
                    : [];
                const newCartItem = {
                    cartItemId: Math.random().toString(36).substr(2, 9),
                    item: selectedItem,
                    ingredients: finalIngredients,
                    forWho: (itemForWho || '').trim()
                };
                setCart(prev => [...prev, newCartItem]);
                setCartAnimation(true);
                setTimeout(() => setCartAnimation(false), 300);
                setView('menu');
            };

            const removeFromCart = (id) => {
                setCart(prev => prev.filter(item => item.cartItemId !== id));
            };

            const submitOrder = () => {
                if (!customerName.trim()) { showAlert('חובה להזין שם!'); return; }
                if (!customerPhone.trim()) { showAlert('חובה להזין טלפון!'); return; }
                if (!arrivalTime) { showAlert('חובה לבחור שעת הגעה!'); return; }
                if (cart.length === 0) { showAlert('העגלה ריקה!'); return; }

                const overrideStatus = settings.overrideStatus || 'auto';
                if (overrideStatus !== 'open') {
                    const [arrH, arrM] = arrivalTime.split(':').map(Number);
                    const arrVal = arrH + arrM / 60;
                    if (arrVal < 16.5 || arrVal > 20.5) {
                        showAlert('שים לב: שעות הפעילות שלנו הן 16:30 עד 20:30. נא בחר שעה בטווח זה.');
                        return;
                    }
                }

                if (!db) {
                    showAlert('שגיאת חיבור למסד הנתונים. נסה שוב.');
                    return;
                }

                const orderId = Date.now().toString();
                const foodItemsCount = cart.filter(c => c && c.item && c.item.category !== 'none').length;
                const todayStr = new Date().toISOString().split('T')[0];

                const newOrder = {
                    items: cart,
                    totalPrice: cart.reduce((tot, c) => tot + Number((c && c.item && c.item.price) || 0), 0),
                    customerName: customerName.trim(),
                    phone: customerPhone.trim(),
                    arrivalTime: arrivalTime,
                    orderNote: orderNote || '',
                    status: foodItemsCount >= 6 ? 'pending_approval' : 'new',
                    workerId: null,
                    workerName: null,
                    timestamp: new Date().toISOString(),
                    dateString: todayStr,
                    customerId: (user && user.uid) || 'anonymous'
                };

                db.collection('orders').doc(orderId).set(newOrder)
                    .then(() => {
                        setCart([]);
                        setOrderNote('');
                        setCustomerName('');
                        setCustomerPhone('');
                        setArrivalTime('');
                        setCurrentOrderId(orderId);
                        setView('tracking');
                    })
                    .catch(e => {
                        console.error("Order error:", e);
                        showAlert('שגיאה בשליחת הזמנה. אנא נסה שוב או פנה אלינו טלפונית.');
                    });
            };

            const updateOrderStatus = (orderId, newStatus) => {
                if (!db || !orderId) return;
                const update = { status: newStatus };
                if (newStatus === 'in_progress') {
                    update.workerId = currentWorkerId;
                    update.workerName = currentWorkerName;
                } else {
                    update.workerId = null;
                    update.workerName = null;
                }
                db.collection('orders').doc(orderId).set(update, { merge: true })
                    .catch(e => { console.error("Update error:", e); showAlert('שגיאה בעדכון הזמנה.'); });
            };

            const deleteOrder = (orderId) => {
                if (!db || !orderId) return;
                db.collection('orders').doc(orderId).delete()
                    .catch(e => { console.error("Delete error:", e); showAlert('שגיאה במחיקת הזמנה.'); });
            };

            const handleSearchOrder = (e) => {
                e.preventDefault();
                const q = (searchQuery || '').trim();
                if (!q) return;
                const found = orders.find(o =>
                    o.status !== 'archived' &&
                    ((o.phone || '').includes(q) || (o.id || '').endsWith(q))
                );
                if (found) {
                    setCurrentOrderId(found.id);
                    setSearchError('');
                    setView('tracking');
                } else {
                    setSearchError('לא מצאנו הזמנה פעילה. אולי היא כבר נאספה או שהמספר שגוי.');
                }
            };

            const handleLogin = () => {
                const trimmedPin = (pin || '').trim();
                if (!trimmedPin) { showAlert('הזן קוד גישה!'); return; }

                // מנהל ראשי
                if (trimmedPin === '1234') {
                    setUserRole('admin');
                    setCurrentWorkerName('מנהל ראשי');
                    setCurrentWorkerId('admin_user');
                    setAdminTab('orders');
                    setFbDraft(settings.facebookLink || '');
                    setIgDraft(settings.instagramLink || '');
                    setAnnouncementDraft(settings.announcement || '');
                    setBitDraft(settings.bitLink || '');
                    setPayboxDraft(settings.payboxLink || '');
                    requestNotificationPermission(); // בקשת פוש
                    setView('dashboard');
                    setPin('');
                    return;
                }

                // ניסיון ראשון — מה-state (מהיר)
                const workerFromState = workers.find(w => String(w.pin) === String(trimmedPin));
                if (workerFromState) {
                    setUserRole('worker');
                    setCurrentWorkerName(workerFromState.name);
                    setCurrentWorkerId(workerFromState.id);
                    requestNotificationPermission(); // בקשת פוש
                    setView('dashboard');
                    setPin('');
                    return;
                }

                // ניסיון שני — ישירות מ-Firestore (לאמינות מקסימלית)
                if (db) {
                    db.collection('workers').get().then(snapshot => {
                        const allWorkers = [];
                        snapshot.forEach(doc => allWorkers.push({ id: doc.id, ...doc.data() }));
                        const found = allWorkers.find(w => String(w.pin) === String(trimmedPin));
                        if (found) {
                            setWorkers(allWorkers); 
                            setUserRole('worker');
                            setCurrentWorkerName(found.name);
                            setCurrentWorkerId(found.id);
                            requestNotificationPermission(); // בקשת פוש
                            setView('dashboard');
                            setPin('');
                        } else {
                            showAlert('קוד גישה שגוי או שאינו קיים במערכת!');
                            setPin('');
                        }
                    }).catch(e => {
                        showAlert('שגיאה בבדיקת קוד גישה: ' + e.message);
                        setPin('');
                    });
                } else {
                    showAlert('קוד גישה שגוי!');
                    setPin('');
                }
            };

            const updateSettingsData = (updates) => {
                if (!db) { showAlert('אין חיבור למסד הנתונים!'); return; }
                db.collection('settings').doc('general').set(updates, { merge: true })
                    .catch(e => {
                        if (e.code === 'permission-denied') {
                            showAlert('שגיאת הרשאות Firestore!\n\nב-Firebase Console → Firestore → Rules, החלף ב:\nallow read, write: if true;');
                        } else {
                            showAlert('שגיאה בשמירה: ' + e.message);
                        }
                    });
            };

            const handleAddEventDate = () => {
                if (!newEventDate) return;
                const currentDates = settings.eventDates || [];
                if (!currentDates.includes(newEventDate)) {
                    updateSettingsData({ eventDates: [...currentDates, newEventDate] });
                    setNewEventDate('');
                    showAlert('התאריך נוסף בהצלחה!');
                } else {
                    showAlert('תאריך זה כבר קיים ברשימה.');
                }
            };

            const handleRemoveEventDate = (dateToRemove) => {
                const newDates = (settings.eventDates || []).filter(d => d !== dateToRemove);
                updateSettingsData({ eventDates: newDates });
            };

            const handleAddMenuItem = (e) => {
                e.preventDefault();
                if (!newItemName.trim() || !newItemPrice) return;
                const newItem = {

                                        </button>
                                        <div className="w-full ml-14">

                                            {c.forWho && (
                                                <div className="inline-block bg-yellow-400 border-2 border-black px-3 py-1 text-base font-black text-black mt-2">
                                                    עבור: {c.forWho}
                                                </div>
                                            )}
                                            {(c.ingredients || []).length > 0
                                                ? <p className="text-base font-bold text-gray-700 mt-3 leading-relaxed">{c.ingredients.join(' • ')}</p>
                                                : (c.item && c.item.category !== 'none')
                                                    ? <p className="text-base bg-black text-white inline-block px-3 py-1 mt-3 font-black uppercase">מנה ריקה!</p>
                                                    : null}
                                        </div>
                                        <span className="font-black text-2xl text-black whitespace-nowrap bg-gray-100 px-4 py-2 border-4 border-black shadow-[2px_2px_0_0_#000]">
                                            {(c.item && c.item.price) || 0} ₪
                                        </span>
                                    </div>
                                ))}
                            </div>

                            <div className="bg-black text-white p-5 border-4 border-black shadow-[6px_6px_0_0_#FFD700] mb-10 flex justify-between items-center">
                                <span className="text-2xl font-black uppercase tracking-widest">סך הכל לתשלום:</span>
                                <span className="text-5xl font-black text-yellow-400">
                                    {cart.reduce((t, c) => t + Number((c.item && c.item.price) || 0), 0)} ₪
                                </span>
                            </div>

                            {cart.filter(c => c.item && c.item.category !== 'none').length >= 6 && (
                                <div className="bg-white text-black p-5 border-4 border-black shadow-[4px_4px_0_0_#000] mb-10 font-black text-lg flex items-start gap-4">
                                    <Icon name="warning-circle" className="shrink-0 text-yellow-500 mt-1" size={32} />
                                    <span>הזמנה של 6 מנות ומעלה דורשת אישור צוות. נעדכן אותך מיד!</span>
                                </div>
                            )}

                            <div className="space-y-6 mb-12 bg-yellow-400 p-6 md:p-8 border-4 border-black shadow-[8px_8px_0_0_#000]">
                                <h3 className="font-black text-black text-3xl mb-6 bg-white inline-block px-4 py-2 border-4 border-black uppercase shadow-[4px_4px_0_0_#000]">פרטי איסוף</h3>

                                <div>
                                    <label className="block font-black text-black mb-2 flex items-center gap-2 text-xl">
                                        <Icon name="user" size={24} /> שם מלא:
                                    </label>
                                    <input
                                        type="text"
                                        value={customerName}
                                        onChange={(e) => setCustomerName(e.target.value)}
                                        className="w-full p-4 border-4 border-black outline-none font-black text-xl focus:bg-white shadow-[4px_4px_0_0_#000]"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block font-black text-black mb-2 flex items-center gap-2 text-xl">
                                        <Icon name="phone" size={24} /> טלפון:
                                    </label>
                                    <input
                                        type="tel"
                                        value={customerPhone}
                                        onChange={(e) => setCustomerPhone(e.target.value)}
                                        className="w-full p-4 border-4 border-black outline-none font-black text-xl tracking-widest focus:bg-white shadow-[4px_4px_0_0_#000]"
                                        required
                                        dir="ltr"
                                    />
                                </div>

                                <div>
                                    <label className="block font-black text-black mb-2 flex items-center gap-2 text-xl">
                                        <Icon name="clock" size={24} /> שעת הגעה {settings.overrideStatus === 'open' ? '' : '(16:30-20:30)'}:
                                    </label>
                                    <input
                                        type="time"
                                        value={arrivalTime}
                                        onChange={(e) => setArrivalTime(e.target.value)}
                                        className="w-full p-4 border-4 border-black outline-none font-black text-2xl focus:bg-white shadow-[4px_4px_0_0_#000]"
                                        required
                                    />
                                </div>

                                <div className="pt-4">
                                    <label className="block font-black text-black mb-2 flex items-center gap-2 text-xl">
                                        <Icon name="file-text" size={24} /> הערה להזמנה <span className="text-sm font-normal">(רשות)</span>:
                                    </label>
                                    <input
                                        type="text"
                                        value={orderNote}
                                        onChange={(e) => setOrderNote(e.target.value)}
                                        placeholder="למשל: בבקשה לשים הרבה מפיות"
                                        className="w-full p-4 border-4 border-black outline-none font-bold text-lg focus:bg-white shadow-[4px_4px_0_0_#000]"
                                    />
                                </div>
                            </div>

                            <button
                                type="button"
                                onClick={submitOrder}
                                className="w-full bg-black text-white hover:bg-gray-900 font-black text-3xl py-6 border-4 border-black shadow-[8px_8px_0_0_#FFD700] active:translate-x-1 active:translate-y-1 active:shadow-[2px_2px_0_0_#FFD700] flex justify-center items-center gap-4 uppercase transition-all"
                            >
                                <Icon name="check" size={36} className="text-yellow-400" /> שלח הזמנה
                            </button>
                        </>
                    )}
                </div>
            );

            const renderTracking = () => {
                const currentOrder = orders.find(o => o.id === currentOrderId);
                if (!currentOrder) return (
                    <div className="bg-white p-8 border-4 border-black shadow-[8px_8px_0_0_#000] max-w-md mx-auto my-10 text-center">
                        <h2 className="text-4xl font-black mb-6 uppercase">לא מצאנו 😕</h2>
                        <p className="mb-10 font-bold text-gray-600 text-xl">ההזמנה נאספה, בוטלה, או שהמספר שגוי.</p>
                        <button
                            type="button"
                            onClick={() => { setView('welcome'); setCurrentOrderId(null); }}
                            className="w-full bg-yellow-400 text-black border-4 border-black font-black py-5 text-2xl shadow-[4px_4px_0_0_#000] uppercase active:translate-y-1 active:translate-x-1 active:shadow-none transition-all"
                        >
                            חזור להתחלה
                        </button>
                    </div>
                );

                const statusSteps = [
                    { id: 'pending_approval', label: 'ממתין לאישור', icon: 'pause-circle' },
                    { id: 'new', label: 'התקבל - בהמתנה', icon: 'activity' },
                    { id: 'in_progress', label: `בהכנה (${currentOrder.workerName || 'צוות'})`, icon: 'chef-hat' },
                    { id: 'ready', label: 'מוכן לאיסוף! 🥙', icon: 'confetti' }
                ];

                let currentStepIndex = statusSteps.findIndex(s => s.id === currentOrder.status);
                if (currentStepIndex === -1) currentStepIndex = 1;

                const safeId = currentOrder.id || '0000';
                const orderNumberText = encodeURIComponent(`הזמנת הפלאפל שלי במספר: #${safeId.slice(-4)}\nבאתר: פלאפל עדני`);
                const waShareLink = `https://wa.me/?text=${orderNumberText}`;

                return (
                    <div className="bg-white p-6 md:p-10 border-4 border-black shadow-[12px_12px_0_0_#000] max-w-lg mx-auto my-10 relative">
                        <div className="absolute top-0 left-0 w-full h-5 bg-yellow-400 border-b-4 border-black"></div>

                        <div className="text-center mb-10 pt-8">
                            <div className="inline-block bg-black text-white px-5 py-2 font-black text-base mb-4 uppercase tracking-widest border-4 border-black shadow-[4px_4px_0_0_#FFD700]">מספר הזמנה</div>
                            <div className="text-7xl font-black text-black tracking-widest drop-shadow-md">#{safeId.slice(-4)}</div>
                        </div>

                        <a
                            href={waShareLink}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="flex items-center justify-center gap-3 bg-white border-4 border-black hover:bg-yellow-400 text-black font-black py-4 px-4 mb-12 shadow-[6px_6px_0_0_#000] transition-all uppercase text-lg"
                        >
                            <Icon name="whatsapp-logo" size={24} /> שמור פרטי הזמנה
                        </a>

                        <div className="space-y-8 relative before:absolute before:inset-0 before:ml-[1.9rem] before:h-full before:w-1 before:bg-black mb-12 pl-2">
                            {statusSteps.map((step, idx) => {
                                if (step.id === 'pending_approval' && currentOrder.status !== 'pending_approval' && currentStepIndex > 0) return null;
                                const isPast = idx < currentStepIndex;
                                const isCurrent = idx === currentStepIndex;
                                const isFuture = idx > currentStepIndex;
                                return (
                                    <div key={step.id} className={`relative flex items-center gap-6 ${isFuture ? 'opacity-40 grayscale' : ''}`}>
                                        <div className={`flex items-center justify-center w-16 h-16 border-4 border-black shrink-0 z-10 transition-all ${isCurrent ? 'bg-yellow-400 text-black shadow-[4px_4px_0_0_#000] scale-110' : isPast ? 'bg-black text-white' : 'bg-white text-gray-400'}`}>
                                            {isPast ? <Icon name="check" size={32} /> : <Icon name={step.icon} size={32} />}
                                        </div>
                                        <div className={`flex-1 p-5 border-4 border-black transition-all ${isCurrent ? 'bg-yellow-400 shadow-[6px_6px_0_0_#000] translate-x-[-4px]' : 'bg-white shadow-[2px_2px_0_0_#000]'}`}>
                                            <h4 className={`font-black text-2xl ${isCurrent ? 'text-black' : isPast ? 'text-gray-800' : 'text-gray-400'}`}>{step.label}</h4>
                                        </div>
                                    </div>
                                );
                            })}

                                    <div className="mt-8 pt-8 border-t-4 border-gray-800">
                                        <p className="font-bold text-gray-300 mb-5 uppercase text-base tracking-widest">תשלום מהיר בדיגיטל:</p>
                                        <div className="flex flex-col gap-5">
                                            {settings.bitLink && (
                                                <a href={settings.bitLink} target="_blank" rel="noopener noreferrer"
                                                    className="bg-white text-black border-4 border-transparent hover:border-yellow-400 font-black py-4 px-6 flex justify-center items-center gap-3 transition-colors uppercase text-xl">
                                                    <Icon name="credit-card" size={28} /> Bit
                                                </a>
                                            )}
                                            {settings.payboxLink && (
                                                <a href={settings.payboxLink} target="_blank" rel="noopener noreferrer"

                                                    <Icon name="credit-card" size={28} /> PayBox
                                                </a>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        <button
                            type="button"
                            onClick={() => { setView('welcome'); setCurrentOrderId(null); }}
                            className="w-full text-black font-black text-xl hover:bg-yellow-400 border-4 border-black p-5 bg-white transition-all uppercase shadow-[6px_6px_0_0_#000] active:translate-x-1 active:translate-y-1 active:shadow-none"
                        >
                            חזור להתחלה
                        </button>
                    </div>
                );
            };

            const renderDashboard = () => {
                const activeOrders = orders.filter(o => o.status !== 'archived');
                const todayStr = new Date().toISOString().split('T')[0];
                const todaysOrders = orders.filter(o => o.dateString === todayStr);
                const todayRevenue = todaysOrders.reduce((acc, o) => acc + (Number(o.totalPrice) || 0), 0);

                return (
                    <div className="max-w-6xl mx-auto pb-10 mt-4">
                        {/* Header */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 bg-black text-white p-6 md:p-8 border-4 border-black shadow-[8px_8px_0_0_#FFD700] gap-6">
                            <div>
                                <h2 className="text-4xl font-black flex items-center gap-4 uppercase mb-4">
                                    {userRole === 'admin'
                                        ? <Icon name="gear" size={40} className="text-yellow-400" />
                                        : <Icon name="chef-hat" size={40} className="text-yellow-400" />}
                                    שלום, {currentWorkerName}
                                </h2>
                                <div className="font-bold flex flex-wrap items-center gap-3 text-xl">
                                    <span className="flex items-center gap-2 bg-gray-800 px-3 py-1 border-2 border-gray-600">
                                        <Icon name="map-pin" size={24} className="text-yellow-400" /> {storeStatus.location}
                                    </span>
                                    <span className={`px-4 py-1 border-4 font-black uppercase tracking-widest ${storeStatus.open && storeStatus.acceptOrders ? 'bg-white text-black border-black' : storeStatus.open ? 'bg-yellow-400 text-black border-black' : 'bg-red-500 text-white border-white'}`}>
                                        {storeStatus.open && storeStatus.acceptOrders ? 'פתוח' : storeStatus.open ? 'פתוח (ללא הזמנות אונליין)' : 'סגור'}
                                    </span>
                                </div>
                            </div>

                            <div className="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                                {userRole === 'admin' && (
                                    <div className="bg-gray-900 border-4 border-gray-700 p-4 text-center">
                                        <div className="text-gray-400 font-bold text-sm uppercase mb-1 flex justify-center items-center gap-1">
                                            <Icon name="chart-bar" size={16} /> הכנסות היום
                                        </div>
                                        <div className="text-3xl font-black text-yellow-400">
                                            {todayRevenue}₪ <span className="text-lg text-white">({todaysOrders.length} הזמנות)</span>
                                        </div>
                                    </div>
                                )}
                                <button
                                    type="button"
                                    onClick={() => {
                                        setView('welcome');
                                        setUserRole('customer');
                                        setCurrentWorkerName('');
                                        setCurrentWorkerId('');
                                        isFirstLoad.current = true;
                                        prevOrderCount.current = 0;
                                    }}
                                    className="bg-white text-black border-4 border-black hover:bg-yellow-400 px-6 py-4 font-black flex justify-center items-center gap-3 shadow-[6px_6px_0_0_#fff] transition-all uppercase text-xl active:translate-y-1 active:translate-x-1 active:shadow-none"
                                >
                                    <Icon name="power" size={24} /> התנתק
                                </button>
                            </div>
                        </div>

                        {/* Admin Tabs */}
                        {userRole === 'admin' && (
                            <div className="flex gap-4 mb-10 overflow-x-auto pb-4 custom-scrollbar">
                                {[
                                    { id: 'orders', name: 'הזמנות חיות', icon: 'bell' },
                                    { id: 'settings', name: 'הגדרות וזמנים', icon: 'gear' },
                                    { id: 'menu', name: 'ניהול תפריט', icon: 'storefront' },
                                    { id: 'workers', name: 'ניהול עובדים', icon: 'users' }
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        type="button"
                                        onClick={() => setAdminTab(tab.id)}
                                        className={`flex items-center gap-3 px-6 py-5 border-4 border-black font-black whitespace-nowrap transition-all uppercase text-xl ${adminTab === tab.id ? 'bg-yellow-400 text-black shadow-[6px_6px_0_0_#000] translate-x-[-2px] translate-y-[-2px]' : 'bg-white text-black hover:bg-gray-100 shadow-[2px_2px_0_0_#000]'}`}
                                    >
                                        <Icon name={tab.icon} size={24} /> {tab.name}
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* ---- SETTINGS TAB ---- */}
                        {userRole === 'admin' && adminTab === 'settings' && (
                            <div className="space-y-10">
                                <div className="bg-white p-6 md:p-10 border-4 border-black shadow-[12px_12px_0_0_#000]">
